<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Materi OOP Dart</title>

<style>

body{
font-family:Arial;
margin:0;
background:#FFF9DB;
}

header{
background:#FFE066;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
background:#FFD43B;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

button:hover{
background:#FCC419;
}

iframe{
margin-top:15px;
border:none;
border-radius:10px;
width:100%;
height:500px;
}

pre{
background:#F8F9FA;
padding:15px;
border-radius:8px;
overflow:auto;
}

</style>

<script>

function buka(id,link){

var tempat=document.getElementById(id);

if(tempat.innerHTML===""){

tempat.innerHTML=
'<iframe src="'+link+'?run=true&null_safety=true"></iframe>';

}

}

</script>

</head>

<body>

<header>
Materi OOP Dart
</header>

<div class="container">

<!-- PROGRAM 1 -->

<div class="card">
<h3>Program 1</h3>

<pre>

  print("Hello World");

}
</pre>

</div>

</div>

<div class="card">
<h3>Program 3</h3>
